<div class="container">
    <div class="mb-2">
        <div>
            <button class="btn btn-outline-primary mb-2 me-2" (click)="isCollapsed = !isCollapsed">Filter</button>
            <button class="btn btn-outline-secondary mb-2 me-2" (click)="ResetFilters()" [hidden]="!filtering">Reset</button>
        </div>

        <div #collapse="ngbCollapse" [(ngbCollapse)]="isCollapsed" >
            <div class="border mb-2 shadow-sm" style="width: 250px;">
                <form action="">
                    <div class="row mx-0">
                        <div class="col">
                            <small><b>Languages:</b></small>
                            <div class="form-group">
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input position-static me-2"
                                        [(ngModel)]="typescript"
                                        (change)="Filter()"
                                        name="Typescript">
                                    <label class="form-check-label small">TypeScript</label>
                                </div>
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input position-static me-2"
                                        [(ngModel)]="vue"
                                        (change)="Filter()"
                                        name="Vue">
                                    <label class="form-check-label small">Vue</label>
                                </div>
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input position-static me-2"
                                        [(ngModel)]="laravel"
                                        (change)="Filter()"
                                        name="Laravel">
                                    <label class="form-check-label small">Laravel</label>
                                </div>
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input position-static me-2"
                                        [(ngModel)]="livewire"
                                        (change)="Filter()"
                                        name="Livewire">
                                    <label class="form-check-label small">Livewire</label>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <small><b>Frameworks:</b></small>
                            <div class="form-group">
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input position-static me-2"
                                        [(ngModel)]="angular"
                                        (change)="Filter()"
                                        name="Angular">
                                    <label class="form-check-label small">Angular</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input position-static me-2"
                                        [(ngModel)]="react"
                                        (change)="Filter()"
                                        name="React">
                                    <label class="form-check-label small">React</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input position-static me-2"
                                        [(ngModel)]="aspnet"
                                        (change)="Filter()"
                                        name="aspnet">
                                    <label class="form-check-label small">ASP.NET</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input position-static me-2"
                                        [(ngModel)]="filament"
                                        (change)="Filter()"
                                        name="Filament">
                                    <label class="form-check-label small">Filament</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

  <div class="row">
    @for (project of projects; track $index) {
      <div class="col-lg-4 col-md-6 mb-4" style="max-width: 380px; min-width: 380px;">
        <app-project-card [project]="project"></app-project-card>
      </div>
    }
  </div>

</div>
